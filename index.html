<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотоотчет</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 400px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        select, input, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #28a745; color: white; border: none; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        .status { text-align: center; color: #666; margin-top: 15px; font-weight: bold; }
    </style>
</head>
<body>
<div class="card">
    <h2>📸 Фотоотчет</h2>
    <label>Выберите магазин:</label>
    <select id="shopSelect"></select>
    <div id="inputs"></div>
    <button id="mainBtn" onclick="send()">ОТПРАВИТЬ ОТЧЕТ</button>
    <p id="status" class="status"></p>
</div>

<script>
    // ВСТАВЬ ССЫЛКУ ИЗ ШАГА 1 НИЖЕ:
    const GOOGLE_SCRIPT_URL = "https://SaigonUkirich.pythonanywhere.com/send";
    
    const shops = [
        { name: "№554. Минск, Минская 7", email: "pozhitoka@dobronom.by" },
        { name: "№123. Минск, Победителей 1", email: "andrew.pozhitok@gmail.com" },
        { name: "№777. Гродно, Советская 5", email: "boss@yandex.ru" }
    ];

    const select = document.getElementById('shopSelect');
    shops.forEach(s => select.add(new Option(s.name, s.email)));

    const inputDiv = document.getElementById('inputs');
    for(let i=0; i<7; i++) {
        let inp = document.createElement('input');
        inp.type = 'file'; inp.className = 'photo-inp'; inp.accept = 'image/*';
        inputDiv.appendChild(inp);
    }

    async function send() {
        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('status');
        btn.disabled = true;
        status.innerText = "Сжимаем фото... Подождите.";

        const payload = {
            target_email: select.value,
            shop_name: select.options[select.selectedIndex].text
        };

        const files = document.querySelectorAll('.photo-inp');
        let count = 0;

        try {
            for(let i=0; i<files.length; i++) {
                if(files[i].files[0]) {
                    const compressed = await imageCompression(files[i].files[0], { maxSizeMB: 0.7, maxWidthOrHeight: 1280 });
                    payload["file" + i] = await imageCompression.getDataUrlFromFile(compressed);
                    count++;
                }
            }

            if(count === 0) throw "Выберите хотя бы одно фото!";

            status.innerText = "Отправка в почту...";
            
            await fetch(GOOGLE_SCRIPT_URL, {
                method: 'POST',
                mode: 'no-cors', 
                body: JSON.stringify(payload)
            });

            alert("Готово! Фото отправлены инженеру.");
            location.reload();
        } catch (e) {
            alert("Ошибка: " + e);
            btn.disabled = false;
            status.innerText = "";
        }
    }
</script>
</body>
</html>
