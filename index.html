<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотоотчет Охрана Труда</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f9; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        .shop-container { position: relative; margin-bottom: 25px; }
        .main-label { display: block; margin-bottom: 8px; font-weight: 700; color: #333; font-size: 15px; }
        #shopInput { width: 100%; padding: 12px; border: 2px solid #e1e4e8; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; }
        .dropdown-content { display: none; position: absolute; width: 100%; max-height: 250px; overflow-y: auto; background: white; border: 1px solid #ddd; border-radius: 10px; z-index: 1000; box-shadow: 0 8px 16px rgba(0,0,0,0.1); margin-top: 5px; }
        .dropdown-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #f8f9fa; font-size: 14px; }
        .dropdown-item:hover { background-color: #f0f7ff; color: #007bff; }
        .photo-grid { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .photo-item { background: #fafafa; padding: 12px; border-radius: 12px; border: 1px solid #eee; display: flex; flex-direction: column; gap: 8px; }
        .photo-label { font-size: 13px; font-weight: 600; color: #555; }
        input[type="file"] { font-size: 13px; color: #666; width: 100%; }
        button { width: 100%; padding: 15px; background: #007bff; color: white; border: none; border-radius: 10px; font-size: 16px; font-weight: bold; cursor: pointer; }
        button:disabled { background: #ccc; }
        .status { text-align: center; margin-top: 15px; font-size: 14px; color: #666; min-height: 40px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📸 Фотоотчет ОТ</h2>
    <div class="shop-container">
        <label class="main-label">Выберите магазин:</label>
        <input type="text" id="shopInput" autocomplete="off" placeholder="Введите номер или город..." onclick="toggleDropdown()" oninput="filterShops()">
        <div id="shopDropdown" class="dropdown-content"></div>
        <input type="hidden" id="selectedEmail">
    </div>

    <div class="photo-grid" id="photoInputs">
        <p style="text-align:center; color:#999; padding: 20px;">Пожалуйста, выберите магазин</p>
    </div>

    <button id="sendBtn" onclick="sendReport()" disabled>ОТПРАВИТЬ ОТЧЕТ</button>
    <p id="status" class="status"></p>
</div>

<script>
    // ОБНОВЛЕННЫЙ АДРЕС СЕРВЕРА НА RENDER
    const SERVER_URL = "https://SaigonUkirich.pythonanywhere.com";
    
    <script>
    // 1. ЗАМЕНИ 'твой_логин' на твой реальный логин в PythonAnywhere
    const SERVER_URL = "https://infodbrot.pythonanywhere.com"; 
    
    let allShops = [];

    // Имена ключей для фото, чтобы сервер их распознал (photo1, photo2 и т.д.)
    const baseLabels = [
        "1. Лицевая сторона личной карточки учета СИЗ",
        "2. Оборотная сторона личной карточки учета СИЗ",
        "3. Журнал регистрации вводного инструктажа",
        "4. Журнал регистрации инструктажа на РМ",
        "5. Журнал контроля за соблюдением требований ОТ",
        "6. Журнал учета и испытаний лестниц",
        "7. Журнал осмотра грузовых тележек"
    ];

    const extraLabels = [
        "8. Освидетельствование работников (рохля)",
        "9. Выпуск на линию (рохля)",
        "10. Неисправности (рохля)",
        "11. Закрепление (рохля)"
    ];

    async function loadShops() {
        try {
            // Убираем .php, так как Flask работает через маршруты
            const r = await fetch(`${SERVER_URL}/get_shops`);
            allShops = await r.json();
            console.log("Список магазинов загружен");
        } catch (e) { 
            document.getElementById('status').innerText = "Ошибка загрузки списка магазинов"; 
        }
    }

    function toggleDropdown() {
        const d = document.getElementById('shopDropdown');
        d.style.display = "block";
        if (allShops.length > 0 && d.innerHTML === "") renderList(allShops.slice(0, 50));
    }

    function filterShops() {
        const t = document.getElementById('shopInput').value.toLowerCase();
        renderList(allShops.filter(s => s.name.toLowerCase().includes(t)).slice(0, 50));
    }

    function renderList(shops) {
        const d = document.getElementById('shopDropdown');
        d.innerHTML = "";
        shops.forEach(s => {
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.innerText = s.name;
            item.onclick = () => {
                document.getElementById('shopInput').value = s.name;
                document.getElementById('selectedEmail').value = s.email;
                document.getElementById('sendBtn').disabled = false;
                document.getElementById('shopDropdown').style.display = "none";
                generateFields(s.is_special);
            };
            d.appendChild(item);
        });
    }

    function generateFields(isSpecial) {
        const container = document.getElementById('photoInputs');
        container.innerHTML = "";
        const currentLabels = isSpecial ? [...baseLabels, ...extraLabels] : baseLabels;

        currentLabels.forEach((text, i) => {
            const item = document.createElement('div');
            item.className = 'photo-item';
            item.innerHTML = `
                <label class="photo-label">${text}</label>
                <input type="file" class="photo-file" accept="image/*">
            `;
            container.appendChild(item);
        });
    }

    window.onclick = (e) => { if (!e.target.matches('#shopInput')) document.getElementById('shopDropdown').style.display = "none"; };

    async function sendReport() {
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('status');
        const email = document.getElementById('selectedEmail').value;
        const shopName = document.getElementById('shopInput').value;

        btn.disabled = true;
        const payload = { target_email: email, shop_name: shopName };
        const inputFields = document.querySelectorAll('.photo-file');
        
        let totalFiles = 0;
        inputFields.forEach(input => { if(input.files.length > 0) totalFiles++; });

        if (totalFiles === 0) {
            status.innerText = "Нужно выбрать хотя бы одно фото!";
            btn.disabled = false;
            return;
        }

        status.innerText = "Сжатие фото...";
        try {
            for (let i = 0; i < inputFields.length; i++) {
                const file = inputFields[i].files[0];
                if (file) {
                    // Сжимаем до 0.5MB, чтобы не перегружать сервер
                    const comp = await imageCompression(file, { maxSizeMB: 0.5, maxWidthOrHeight: 1280 });
                    const base64 = await imageCompression.getDataUrlFromFile(comp);
                    // Ключи будут photo1, photo2... как ждет app.py
                    payload[`photo${i + 1}`] = base64;
                }
            }
        } catch (e) {
            alert("Ошибка сжатия!");
            btn.disabled = false;
            return;
        }

        try {
            status.innerText = "Отправка на сервер...";
            const res = await fetch(`${SERVER_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (res.ok) {
                alert("✅ Отчет успешно отправлен!");
                location.reload();
            } else {
                const errData = await res.json();
                alert("❌ Ошибка сервера: " + (errData.error || "Неизвестная ошибка"));
            }
        } catch (err) {
            alert("Ошибка сети. Проверьте логи в PythonAnywhere.");
        } finally {
            btn.disabled = false;
            status.innerText = "";
        }
    }

    loadShops();
</script>
</script>
</body>
</html>
