<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотоотчет Охрана Труда</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7f9; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 16px; width: 100%; max-width: 450px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }

        .shop-container { position: relative; margin-bottom: 25px; }
        .main-label { display: block; margin-bottom: 8px; font-weight: 700; color: #333; font-size: 15px; }
        #shopInput { width: 100%; padding: 12px; border: 2px solid #e1e4e8; border-radius: 10px; font-size: 16px; box-sizing: border-box; outline: none; transition: border-color 0.3s; }
        #shopInput:focus { border-color: #007bff; }

        .dropdown-content {
            display: none; position: absolute; width: 100%; max-height: 250px;
            overflow-y: auto; background: white; border: 1px solid #ddd;
            border-radius: 10px; z-index: 1000; box-shadow: 0 8px 16px rgba(0,0,0,0.1); margin-top: 5px;
        }
        .dropdown-item { padding: 12px; cursor: pointer; border-bottom: 1px solid #f8f9fa; font-size: 14px; }
        .dropdown-item:hover { background-color: #f0f7ff; color: #007bff; }

        .photo-grid { display: flex; flex-direction: column; gap: 15px; margin-bottom: 25px; }
        .photo-item {
            background: #fafafa; padding: 12px; border-radius: 12px;
            border: 1px solid #eee; display: flex; flex-direction: column; gap: 8px;
        }
        .photo-label { font-size: 13px; font-weight: 600; color: #555; }
        .photo-hint { font-size: 11px; color: #999; margin-top: -4px; }

        input[type="file"] { font-size: 13px; color: #666; width: 100%; }

        button {
            width: 100%; padding: 15px; background: #007bff; color: white;
            border: none; border-radius: 10px; font-size: 16px; font-weight: bold;
            cursor: pointer; transition: background 0.3s;
        }
        button:hover { background: #0056b3; }
        button:disabled { background: #ccc; cursor: not-allowed; }

        .status { text-align: center; margin-top: 15px; font-size: 14px; color: #666; min-height: 40px; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>📸 Фотоотчет ОТ</h2>

    <div class="shop-container">
        <label class="main-label">Выберите магазин:</label>
        <input type="text" id="shopInput" autocomplete="off" placeholder="Начните вводить номер или город..." onclick="toggleDropdown()" oninput="filterShops()">
        <div id="shopDropdown" class="dropdown-content"></div>
        <input type="hidden" id="selectedEmail">
    </div>

    <div class="photo-grid" id="photoInputs"></div>

    <button id="sendBtn" onclick="sendReport()">ОТПРАВИТЬ ОТЧЕТ</button>
    <p id="status" class="status"></p>
</div>

<script>
    const SERVER_URL = "https://SaigonUkirich.pythonanywhere.com";
    let allShops = [];

    const labels = [
        "1. Лицевая сторона личной карточки учёта средств индивидуальной защиты",
        "2. Оборотная сторона личной карточки учёта средств индивидуальной защиты",
        "3. Журнал регистрации вводного инструктажа по охране труда",
        "4. Журнал регистрации инструктажа по охране труда",
        "5. Журнал контроля за соблюдением требований по охране труда",
        "6. Журнал учета и испытаний лестниц, стремянок (+ бирки)",
        "7. Журнал осмотра грузовых тележек (+ бирки)"
    ];

    // Отрисовка полей
    const photoContainer = document.getElementById('photoInputs');
    labels.forEach((text, i) => {
        const item = document.createElement('div');
        item.className = 'photo-item';
        item.innerHTML = `
            <label class="photo-label">${text}</label>
            <span class="photo-hint">Можно выбрать несколько фото</span>
            <input type="file" class="photo-file" accept="image/*" multiple>
        `;
        photoContainer.appendChild(item);
    });

    async function loadShops() {
        try {
            const response = await fetch(`${SERVER_URL}/get_shops`);
            allShops = await response.json();
        } catch (e) {
            document.getElementById('status').innerText = "Ошибка загрузки списка магазинов";
        }
    }

    function toggleDropdown() {
        const d = document.getElementById('shopDropdown');
        d.style.display = "block";
        if (allShops.length > 0 && d.innerHTML === "") renderList(allShops.slice(0, 50));
    }

    function filterShops() {
        const text = document.getElementById('shopInput').value.toLowerCase();
        const filtered = allShops.filter(s => s.name.toLowerCase().includes(text));
        renderList(filtered.slice(0, 50));
    }

    function renderList(shops) {
        const d = document.getElementById('shopDropdown');
        d.innerHTML = "";
        shops.forEach(s => {
            const item = document.createElement('div');
            item.className = 'dropdown-item';
            item.innerText = s.name;
            item.onclick = () => {
                document.getElementById('shopInput').value = s.name;
                document.getElementById('selectedEmail').value = s.email;
                d.style.display = "none";
            };
            d.appendChild(item);
        });
    }

    window.onclick = (e) => { if (!e.target.matches('#shopInput')) document.getElementById('shopDropdown').style.display = "none"; };

    async function sendReport() {
        const btn = document.getElementById('sendBtn');
        const status = document.getElementById('status');
        const email = document.getElementById('selectedEmail').value;
        const shopName = document.getElementById('shopInput').value;

        if (!email) return alert("Пожалуйста, выберите магазин!");

        btn.disabled = true;
        const payload = { target_email: email, shop_name: shopName };
        const inputFields = document.querySelectorAll('.photo-file');

        // Считаем общее кол-во файлов
        let totalFilesToProcess = 0;
        inputFields.forEach(input => totalFilesToProcess += input.files.length);

        if (totalFilesToProcess === 0) {
            alert("Выберите хотя бы одно фото!");
            btn.disabled = false;
            return;
        }
        if (totalFilesToProcess > 30) {
            alert("Максимально можно отправить 30 фото. У вас выбрано: " + totalFilesToProcess);
            btn.disabled = false;
            return;
        }

        try {
            let processedCount = 0;
            for (let i = 0; i < inputFields.length; i++) {
                const files = inputFields[i].files;
                for (let j = 0; j < files.length; j++) {
                    processedCount++;
                    status.innerHTML = `Обработка фото ${processedCount} из ${totalFilesToProcess}...<br><small>Пожалуйста, подождите</small>`;

                    // Сжимаем до 0.6МБ для запаса под лимит Gmail
                    const compressed = await imageCompression(files[j], {
                        maxSizeMB: 0.6,
                        maxWidthOrHeight: 1200,
                        useWebWorker: true
                    });
                    const base64 = await imageCompression.getDataUrlFromFile(compressed);
                    payload[`f${i}_${j}`] = base64;
                }
            }

            status.innerHTML = `Отправка ${totalFilesToProcess} фото...<br><small>Это может занять до минуты</small>`;
            const response = await fetch(`${SERVER_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("Отчет успешно отправлен!");
                location.reload();
            } else {
                const err = await response.json();
                throw "Ошибка сервера: " + (err.message || "попробуйте меньше фото");
            }
        } catch (err) {
            alert(err);
            btn.disabled = false;
            status.innerText = "";
        }
    }

    loadShops();
</script>
</body>
</html>
