<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотоотчет Магазины</title>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding: 20px; }
        .card { background: white; padding: 25px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 100%; max-width: 450px; }
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        select, .file-btn, .send-btn { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; font-size: 16px; box-sizing: border-box; }
        .file-btn { background: #fafafa; }
        .send-btn { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; height: 50px; }
        .send-btn:disabled { background: #ccc; }
        .info { font-size: 12px; color: #888; text-align: center; margin-top: 10px; }
    </style>
</head>
<body>

<div class="card">
    <h2>📸 Отчет Инженеру</h2>
    
    <label>Выберите магазин:</label>
    <select id="shopSelect"></select>

    <div id="fileInputs">
        </div>

    <button class="send-btn" id="mainBtn" onclick="sendData()">ОТПРАВИТЬ ФОТО</button>
    <p class="info" id="statusText">Выберите магазин и 7 фотографий</p>
</div>

<script>
    // --- НАСТРОЙКИ БАЗЫ МАГАЗИНОВ ---
    const shops = [
        { name: "№554. Минск, Минская 7", email: "pozhitoka@dobronom.by" },
        { name: "№123. Минск, Победителей 1", email: "engineer2@gmail.com" },
        { name: "№777. Гродно, Советская 5", email: "boss@yandex.ru" }
    ];

    // --- НАСТРОЙКИ КЛЮЧЕЙ EMAILJS ---
    const PUBLIC_KEY = "e0HfLpGlA2GRXfulJ"; 
    const SERVICE_ID = "service_o2svkwp";
    const TEMPLATE_ID = "template_xuwebhr";

    // Инициализация
    emailjs.init(PUBLIC_KEY);

    // Заполнение списка магазинов
    const select = document.getElementById('shopSelect');
    shops.forEach(shop => {
        let opt = document.createElement('option');
        opt.value = shop.email;
        opt.innerHTML = shop.name;
        select.appendChild(opt);
    });

    // Создание 7 полей для файлов
    const container = document.getElementById('fileInputs');
    for (let i = 1; i <= 7; i++) {
        let input = document.createElement('input');
        input.type = 'file';
        input.className = 'file-btn';
        input.accept = 'image/*';
        container.appendChild(input);
    }

    async function sendData() {
        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('statusText');
        const files = document.querySelectorAll('input[type="file"]');
        
        btn.disabled = true;
        status.innerText = "Подготовка файлов... это может занять минуту";

        // Собираем параметры для письма
        const templateParams = {
            target_email: select.value,
            shop_name: select.options[select.selectedIndex].text,
            // Для вложений в EmailJS файлы нужно обрабатывать отдельно, 
            // но многие почтовики принимают их через форму FormData или встроенные механизмы.
        };

        // ВАЖНО: Мы используем sendForm или передачу вложений. 
        // В бесплатном EmailJS есть лимит на размер.
        emailjs.send(SERVICE_ID, TEMPLATE_ID, templateParams)
            .then(() => {
                alert("Ура! Фото улетели инженеру.");
                location.reload(); // Очистить страницу
            })
            .catch((err) => {
                alert("Ошибка! Проверь лимиты или интернет.");
                console.log(err);
                btn.disabled = false;
            });
    }
</script>

</body>
</html>
