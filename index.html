<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Фотоотчет Охрана Труда</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/browser-image-compression/2.0.2/browser-image-compression.min.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; padding: 20px; display: flex; justify-content: center; }
        .card { background: white; padding: 25px; border-radius: 15px; width: 100%; max-width: 450px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input, select, button { width: 100%; padding: 12px; margin-top: 10px; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; font-size: 16px; }
        button { background: #007bff; color: white; border: none; font-weight: bold; cursor: pointer; margin-top: 20px; }
        button:disabled { background: #ccc; }
        .status { text-align: center; color: #666; margin-top: 15px; font-weight: bold; min-height: 20px; }
        #shopSelect { height: 150px; } /* Делаем список выше для удобства */
    </style>
</head>
<body>
<div class="card">
    <h2>📸 Фотоотчет</h2>

    <label>Поиск магазина (номер или город):</label>
    <input type="text" id="shopSearch" placeholder="Введите № или город..." oninput="filterShops()">

    <select id="shopSelect" size="5"></select>

    <div id="inputs">
        </div>

    <button id="mainBtn" onclick="send()">ОТПРАВИТЬ ОТЧЕТ</button>
    <p id="status" class="status"></p>
</div>

<script>
    const SERVER_URL = "https://SaigonUkirich.pythonanywhere.com";
    let allShops = [];

    // Создаем поля для выбора файлов
    const inputDiv = document.getElementById('inputs');
    for(let i=0; i<7; i++) {
        let inp = document.createElement('input');
        inp.type = 'file'; inp.className = 'photo-inp'; inp.accept = 'image/*';
        inputDiv.appendChild(inp);
    }

    // Загрузка магазинов с сервера при старте
    async function loadShops() {
        document.getElementById('status').innerText = "Загрузка списка магазинов...";
        try {
            const response = await fetch(`${SERVER_URL}/get_shops`);
            allShops = await response.json();
            displayShops(allShops);
            document.getElementById('status').innerText = "";
        } catch (e) {
            document.getElementById('status').innerText = "Ошибка загрузки магазинов";
        }
    }

    function displayShops(shops) {
        const select = document.getElementById('shopSelect');
        select.innerHTML = "";
        shops.forEach(s => select.add(new Option(s.name, s.email)));
    }

    function filterShops() {
        const text = document.getElementById('shopSearch').value.toLowerCase();
        const filtered = allShops.filter(s => s.name.toLowerCase().includes(text));
        displayShops(filtered);
    }

    async function send() {
        const btn = document.getElementById('mainBtn');
        const status = document.getElementById('status');
        const select = document.getElementById('shopSelect');

        if (!select.value) return alert("Сначала выберите магазин в списке!");

        btn.disabled = true;
        status.innerText = "Сжимаем фото...";

        const payload = {
            target_email: select.value,
            shop_name: select.options[select.selectedIndex].text
        };

        const files = document.querySelectorAll('.photo-inp');
        let count = 0;

        try {
            for(let i=0; i<files.length; i++) {
                if(files[i].files[0]) {
                    const compressed = await imageCompression(files[i].files[0], { maxSizeMB: 0.7, maxWidthOrHeight: 1280 });
                    payload["file" + i] = await imageCompression.getDataUrlFromFile(compressed);
                    count++;
                }
            }

            if(count === 0) throw "Выберите хотя бы одно фото!";

            status.innerText = "Отправка отчета...";

            const response = await fetch(`${SERVER_URL}/send`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            if (response.ok) {
                alert("Успешно! Отчет отправлен.");
                location.reload();
            } else {
                const err = await response.json();
                throw "Ошибка: " + err.message;
            }
        } catch (e) {
            alert(e);
            btn.disabled = false;
            status.innerText = "";
        }
    }

    loadShops();
</script>
</body>
</html>
